<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tài Khoản | ExpenseOwl</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .profile-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            max-width: 500px;
            margin: 20px auto;
        }
        .avatar-circle {
            width: 100px; height: 100px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; margin: 0 auto 20px;
            border: 4px solid var(--bg-primary);
        }
        .info-grid {
            text-align: left;
            margin-top: 25px;
            display: grid; gap: 15px;
        }
        .info-item {
            display: flex; justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        .label { color: var(--text-secondary); font-size: 0.9rem; }
        .value { color: var(--text-primary); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Thanh điều hướng (Nhớ thêm icon Tài khoản vào đây) -->
        <header>
            <div class="nav-bar">
                <a href="/" class="view-button"><i class="fa-solid fa-chart-pie"></i></a>
                <a href="/settings" class="view-button"><i class="fa-solid fa-gear"></i></a>
                <a href="/profile" class="view-button active"><i class="fa-solid fa-user-tie"></i></a>
            </div>
        </header>

        <div class="profile-card">
            <div class="avatar-circle" id="userInitial">M</div>
            <h2 id="displayFullName" style="margin: 0; color: var(--accent);">Tên Người Dùng</h2>
            <p id="displayUsername" style="color: var(--text-secondary); font-size: 0.9rem;">@username</p>

            <div class="info-grid">
                <div class="info-item"><span class="label">Email</span><span class="value" id="userEmail">-</span></div>
                <div class="info-item"><span class="label">Ngày sinh</span><span class="value" id="userDob">-</span></div>
                <div class="info-item"><span class="label">Giới tính</span><span class="value" id="userGender">-</span></div>
                <div class="info-item"><span class="label">Mục tiêu AI</span><span class="value" id="userGoal" style="color: #4ade80;">-</span></div>
            </div>

            <button onclick="window.location.href='/settings'" class="nav-button" style="margin-top: 25px; width: 100%;">
                <i class="fa-solid fa-user-pen"></i> Chỉnh sửa hồ sơ
            </button>
        </div>
    </div>

    <script>
        async function loadProfile() {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/auth/me', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const data = await res.json();
                document.getElementById('displayFullName').textContent = data.full_name;
                document.getElementById('displayUsername').textContent = '@' + data.username;
                document.getElementById('userEmail').textContent = data.email;
                document.getElementById('userDob').textContent = data.dob || 'Chưa cập nhật';
                document.getElementById('userGender').textContent = data.gender || 'Bảo mật';
                document.getElementById('userGoal').textContent = data.financial_goal;
                document.getElementById('userInitial').textContent = data.full_name.charAt(0).toUpperCase();
            }
        }
        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
    
</body>
</html>
