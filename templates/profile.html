<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <!-- 💡 Khóa tính năng Zoom (Chụm ngón tay) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tài Khoản | ExpenseOwl</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'system';
            if (theme === 'light') { document.documentElement.setAttribute('data-theme', 'light'); } 
            else if (theme === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); }
        })();
    </script>
    <style>
        /* --- BẮT ĐẦU CSS CHUẨN HÓA GIAO DIỆN (GIỐNG INDEX) --- */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            overflow-x: hidden !important; 
            overflow-y: auto !important;   
            width: 100%;
            max-width: 100vw;
            margin: 0;
            padding: 0;
        }

        .container {
            overflow-x: hidden !important;
            width: 100%;
            max-width: 100vw;
        }

        /* CSS MENU 3 CHẤM CHO ĐIỆN THOẠI */
        .more-menu-container {
            display: none; 
            position: relative;
            margin-left: auto; 
        }
        .more-dropdown {
            display: none;
            position: absolute;
            top: 110%;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            flex-direction: column;
            min-width: 180px;
            z-index: 1000;
            overflow: hidden;
        }
        .more-dropdown.show {
            display: flex;
            animation: fadeIn 0.2s ease;
        }
        .more-dropdown a {
            padding: 12px 15px;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            transition: background 0.2s;
            border-bottom: 1px solid var(--border);
        }
        .more-dropdown a:last-child {
            border-bottom: none;
        }
        .more-dropdown a:hover {
            background: var(--bg-primary);
        }
        .more-dropdown a i {
            width: 20px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .hide-on-mobile {
                display: none !important;
            }
            .more-menu-container {
                display: block;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* --- KẾT THÚC CSS CHUẨN HÓA --- */

        /* CSS GIAO DIỆN TÀI KHOẢN */
        .profile-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            max-width: 500px;
            margin: 40px auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .avatar-circle {
            width: 100px; height: 100px;
            background: linear-gradient(145deg, var(--accent), #d4a5ff);
            color: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; margin: 0 auto 20px;
            border: 4px solid var(--bg-primary);
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
        }
        .info-grid {
            text-align: left;
            margin-top: 25px;
            display: grid; gap: 15px;
        }
        .info-item {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        .label { color: var(--text-secondary); font-size: 0.9rem; }
        .value { color: var(--text-primary); font-weight: bold; }
        
        .themed-input {
            padding: 6px 10px; border-radius: 6px; border: 1px solid var(--accent); 
            background-color: var(--bg-primary); color: var(--text-primary); 
            outline: none; font-family: inherit; font-size: 0.9rem;
        }
        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Thanh điều hướng -->
        <header>
            <div class="nav-bar">
                <a href="/" class="view-button" data-tooltip="Trang Chủ"><i class="fa-solid fa-chart-pie"></i></a>
                <a href="/history" class="view-button" data-tooltip="Hoạt động"><i class="fa-solid fa-clock-rotate-left"></i></a>
                <a href="/trends" class="view-button" data-tooltip="Biến động"><i class="fa-solid fa-chart-line"></i></a>
                <a href="/planning" class="view-button" data-tooltip="Ngân sách"><i class="fa-solid fa-piggy-bank"></i></a>
                
                <!-- Các tab sẽ bị ẩn vào Nút 3 chấm trên điện thoại -->
                <a href="/suggestions" class="view-button hide-on-mobile" data-tooltip="Gợi Ý AI"><i class="fa-solid fa-lightbulb"></i></a>
                <a href="/profile" class="view-button active hide-on-mobile" data-tooltip="Tài Khoản"><i class="fa-solid fa-user-tie"></i></a>
                <a href="/settings" class="view-button hide-on-mobile" data-tooltip="Cài Đặt"><i class="fa-solid fa-gear"></i></a>
                <a href="javascript:void(0)" class="view-button hide-on-mobile" onclick="showLogoutModal()" data-tooltip="Đăng Xuất" style="margin-left: auto; color: #ff4d4d;"><i class="fa-solid fa-right-from-bracket"></i></a>

                <!-- Menu 3 chấm (Hiển thị trên Mobile) -->
                <div class="more-menu-container">
                    <a href="javascript:void(0)" class="view-button" id="mobileMoreBtn" style="padding: 10px 15px;">
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </a>
                    <div class="more-dropdown" id="mobileMoreDropdown">
                        <a href="/suggestions"><i class="fa-solid fa-lightbulb" style="color: #f59e0b"></i> Gợi Ý AI</a>
                        <a href="/profile" style="color: var(--accent);"><i class="fa-solid fa-user-tie" style="color: var(--accent);"></i> Tài khoản</a>
                        <a href="/settings"><i class="fa-solid fa-gear" style="color: #8b5cf6"></i> Cài Đặt</a>
                        <a href="javascript:void(0)" onclick="showLogoutModal()" style="color: #ff4d4d"><i class="fa-solid fa-right-from-bracket"></i> Đăng Xuất</a>
                    </div>
                </div>
            </div>
        </header>

        <div class="profile-card">
            <div class="avatar-circle" id="userInitial"><i class="fa-solid fa-spinner fa-spin" style="font-size: 30px;"></i></div>
            
            <!-- VÙNG HIỂN THỊ TÊN -->
            <h2 id="displayFullName" style="margin: 0; color: var(--accent);">Đang tải...</h2>
            <input type="text" id="editFullName" class="themed-input" style="display: none; width: 80%; text-align: center; margin: 0 auto; font-size: 1.2rem; font-weight: bold;">
            
            <p id="displayUsername" style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 5px;">@...</p>

            <div class="info-grid">
                <!-- KHÔNG CHO ĐỔI EMAIL ĐỂ BẢO MẬT -->
                <div class="info-item">
                    <span class="label">Email <i class="fa-solid fa-lock" style="font-size: 0.7rem; color: #555;"></i></span>
                    <span class="value" id="userEmail">-</span>
                </div>
                
                <!-- NGÀY SINH -->
                <div class="info-item">
                    <span class="label">Ngày sinh</span>
                    <span class="value" id="displayDob">-</span>
                    <input type="date" id="editDob" class="themed-input" style="display: none;">
                </div>
                
                <!-- GIỚI TÍNH -->
                <div class="info-item">
                    <span class="label">Giới tính</span>
                    <span class="value" id="displayGender">-</span>
                    <select id="editGender" class="themed-input" style="display: none;">
                        <option value="male">Nam</option>
                        <option value="female">Nữ</option>
                        <option value="other">Khác</option>
                        <option value="secret">Bảo mật</option>
                    </select>
                </div>
                
                <!-- MỤC TIÊU AI (Dẫn link qua cài đặt) -->
                <div class="info-item">
                    <span class="label">Mục tiêu AI</span>
                    <span class="value" id="userGoal" style="color: #4ade80;">-</span>
                </div>
            </div>

            <!-- CÁC NÚT HÀNH ĐỘNG -->
            <div id="viewActions" class="btn-group">
                <button onclick="toggleEditMode()" class="nav-button" style="flex: 1; background-color: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border);">
                    <i class="fa-solid fa-user-pen"></i> Chỉnh sửa
                </button>
                <button onclick="showPasswordModal()" class="nav-button" style="flex: 1; background-color: #ff9800; color: white; border: none;">
                    <i class="fa-solid fa-key"></i> Đổi mật khẩu
                </button>
            </div>
            
            <div id="editActions" class="btn-group" style="display: none;">
                <button onclick="cancelEdit()" class="nav-button" style="flex: 1; background-color: transparent; border: 1px solid var(--text-secondary); color: var(--text-secondary);">Hủy</button>
                <button onclick="saveProfile(this)" class="nav-button" style="flex: 1; background-color: #4ade80; color: #111; border: none; font-weight: bold;">Lưu thay đổi</button>
            </div>
        </div>
    </div>

    <!-- MODAL ĐỔI MẬT KHẨU -->
    <div id="passwordModal" class="modal" style="display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); align-items: center; justify-content: center;">
        <div style="background-color: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; width: 90%; max-width: 400px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);">
            <h3 style="color: var(--accent); margin-top: 0; text-align: center;"><i class="fa-solid fa-shield-halved"></i> Đổi Mật Khẩu</h3>
            <div style="display: flex; flex-direction: column; gap: 15px; margin: 20px 0;">
                <input type="password" id="oldPassword" class="themed-input" placeholder="Mật khẩu hiện tại" style="width: 100%;">
                <input type="password" id="newPassword" class="themed-input" placeholder="Mật khẩu mới (tối thiểu 6 ký tự)" style="width: 100%;">
                <input type="password" id="confirmPassword" class="themed-input" placeholder="Nhập lại mật khẩu mới" style="width: 100%;">
            </div>
            <div style="display: flex; gap: 15px;">
                <button onclick="closePasswordModal()" style="flex: 1; padding: 10px; background: transparent; color: var(--text-primary); border: 1px solid var(--border); border-radius: 6px; cursor: pointer;">Hủy</button>
                <button onclick="submitPasswordChange(this)" style="flex: 1; padding: 10px; background-color: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Cập nhật</button>
            </div>
        </div>
    </div>

    <!-- MODAL XÁC NHẬN ĐĂNG XUẤT -->
    <div id="logoutConfirmModal" class="modal" style="display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); align-items: center; justify-content: center;">
        <div style="background-color: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; width: 90%; max-width: 400px; padding: 25px; text-align: center;">
            <h3 style="color: var(--accent); margin-top: 0; margin-bottom: 15px;"><i class="fa-solid fa-right-from-bracket"></i> Xác nhận Đăng Xuất</h3>
            <p style="color: var(--text-secondary); line-height: 1.6; margin-bottom: 25px;">Bạn có chắc chắn muốn đăng xuất?</p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button onclick="closeLogoutModal()" style="flex: 1; padding: 10px 20px; background-color: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border); border-radius: 6px; cursor: pointer;">Hủy bỏ</button>
                <button onclick="proceedLogout()" style="flex: 1; padding: 10px 20px; background-color: #ff4d4d; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Đăng Xuất</button>
            </div>
        </div>
    </div>

    <script src="/static/functions.js"></script>
    <script>
        let currentUserData = {};

        async function loadProfile() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/login'; return; }
            
            try {
                const res = await fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` }});
                if (res.ok) {
                    const data = await res.json();
                    currentUserData = data; // Lưu lại để dùng khi Edit
                    
                    document.getElementById('displayFullName').textContent = data.full_name;
                    document.getElementById('displayUsername').textContent = '@' + data.username;
                    document.getElementById('userEmail').textContent = data.email;
                    document.getElementById('displayDob').textContent = data.dob || 'Chưa cập nhật';
                    
                    let genderText = 'Bảo mật';
                    if (data.gender === 'male') genderText = 'Nam';
                    else if (data.gender === 'female') genderText = 'Nữ';
                    else if (data.gender === 'other') genderText = 'Khác';
                    document.getElementById('displayGender').textContent = genderText;
                    
                    document.getElementById('userGoal').textContent = data.financial_goal || 'Chưa xác định';
                    if (data.full_name) document.getElementById('userInitial').textContent = data.full_name.charAt(0).toUpperCase();
                } else if (res.status === 401) {
                    localStorage.removeItem('token'); window.location.href = '/login';
                }
            } catch (error) { console.error("Lỗi:", error); }
        }

        // ====== CHỨC NĂNG CHỈNH SỬA HỒ SƠ ======
        function toggleEditMode() {
            // Hiển thị Input
            document.getElementById('displayFullName').style.display = 'none';
            document.getElementById('editFullName').style.display = 'block';
            document.getElementById('editFullName').value = currentUserData.full_name;

            document.getElementById('displayDob').style.display = 'none';
            document.getElementById('editDob').style.display = 'inline-block';
            document.getElementById('editDob').value = currentUserData.dob || '';

            document.getElementById('displayGender').style.display = 'none';
            document.getElementById('editGender').style.display = 'inline-block';
            document.getElementById('editGender').value = currentUserData.gender || 'secret';

            // Đổi nút
            document.getElementById('viewActions').style.display = 'none';
            document.getElementById('editActions').style.display = 'flex';
        }

        function cancelEdit() {
            document.getElementById('displayFullName').style.display = 'block';
            document.getElementById('editFullName').style.display = 'none';
            document.getElementById('displayDob').style.display = 'inline';
            document.getElementById('editDob').style.display = 'none';
            document.getElementById('displayGender').style.display = 'inline';
            document.getElementById('editGender').style.display = 'none';
            
            document.getElementById('viewActions').style.display = 'flex';
            document.getElementById('editActions').style.display = 'none';
        }

        async function saveProfile(btn) {
            const newName = document.getElementById('editFullName').value.trim();
            const newDob = document.getElementById('editDob').value;
            const newGender = document.getElementById('editGender').value;

            if (newName.length < 2) {
                if(window.showToast) showToast("Tên phải từ 2 ký tự trở lên!", "error");
                return;
            }

            const token = localStorage.getItem('token');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/me/update', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ full_name: newName, dob: newDob, gender: newGender })
                });

                if (res.ok) {
                    if(window.showToast) showToast("Đã lưu thông tin cá nhân!", "success");
                    cancelEdit();
                    loadProfile(); // Tải lại thông tin mới lên màn hình
                } else {
                    if(window.showToast) showToast("Lỗi khi cập nhật!", "error");
                }
            } catch (e) {
                if(window.showToast) showToast("Lỗi kết nối máy chủ", "error");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // ====== CHỨC NĂNG ĐỔI MẬT KHẨU ======
        function showPasswordModal() { 
            document.getElementById('passwordModal').style.display = 'flex'; 
            document.getElementById('oldPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }
        function closePasswordModal() { document.getElementById('passwordModal').style.display = 'none'; }
        
        async function submitPasswordChange(btn) {
            const oldPass = document.getElementById('oldPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (!oldPass || !newPass) { if(window.showToast) showToast("Vui lòng điền đủ thông tin", "error"); return; }
            if (newPass.length < 6) { if(window.showToast) showToast("Mật khẩu mới phải từ 6 ký tự!", "error"); return; }
            if (newPass !== confirmPass) { if(window.showToast) showToast("Mật khẩu xác nhận không khớp!", "error"); return; }

            const token = localStorage.getItem('token');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; btn.disabled = true;

            try {
                const res = await fetch('/api/auth/change-password', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ old_password: oldPass, new_password: newPass })
                });
                const data = await res.json();
                
                if (res.ok) {
                    if(window.showToast) showToast("Đổi mật khẩu thành công! Vui lòng đăng nhập lại.", "success");
                    closePasswordModal();
                    setTimeout(() => { localStorage.removeItem('token'); window.location.href = '/login'; }, 2000);
                } else {
                    if(window.showToast) showToast(data.detail || "Lỗi cập nhật", "error");
                }
            } catch (e) {
                if(window.showToast) showToast("Lỗi kết nối máy chủ", "error");
            } finally { btn.innerHTML = originalText; btn.disabled = false; }
        }

        // ====== CHỨC NĂNG ĐĂNG XUẤT ======
        function showLogoutModal() { document.getElementById('logoutConfirmModal').style.display = 'flex'; }
        function closeLogoutModal() { document.getElementById('logoutConfirmModal').style.display = 'none'; }
        function proceedLogout() {
            closeLogoutModal();
            if (typeof logout === 'function') { logout(); } 
            else { localStorage.removeItem('token'); window.location.href = '/login'; }
        }

        // 💡 TÍCH HỢP LOGIC NÚT 3 CHẤM MOBILE CÙNG VỚI LOAD PROFILE
        document.addEventListener('DOMContentLoaded', () => {
            // Tải dữ liệu hồ sơ
            loadProfile();

            // Khởi tạo sự kiện Menu 3 chấm Mobile
            const mobileMoreBtn = document.getElementById("mobileMoreBtn");
            const mobileMoreDropdown = document.getElementById("mobileMoreDropdown");
            if (mobileMoreBtn && mobileMoreDropdown) {
                mobileMoreBtn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    mobileMoreDropdown.classList.toggle("show");
                });
                document.addEventListener("click", (e) => {
                    if (!mobileMoreDropdown.contains(e.target) && e.target !== mobileMoreBtn) {
                        mobileMoreDropdown.classList.remove("show");
                    }
                });
            }
        });
    </script>
    <script src="/static/chatbot.js"></script>
</body>
</html>
