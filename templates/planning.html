    <script src="/static/functions.js"></script>
    <script>
        let currentPeriodType = "month";
        let currentDate = new Date();
        let allJarsCache = [];
        let currentTransferType = 'deposit';
        let selectedTargetJarId = null;

        const getISODate = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

        function getPeriodBoundsOverride(date, period) {
            const localDate = new Date(date);
            if (period === "year") return { start: new Date(Date.UTC(localDate.getFullYear(), 0, 1)), end: new Date(Date.UTC(localDate.getFullYear(), 11, 31, 23, 59, 59)) };
            if (period === "week") {
                const day = localDate.getDay() || 7; 
                const start = new Date(localDate); start.setDate(localDate.getDate() - day + 1); start.setHours(0,0,0,0);
                const end = new Date(start); end.setDate(start.getDate() + 6); end.setHours(23,59,59);
                return { start, end };
            }
            return { start: new Date(Date.UTC(localDate.getFullYear(), localDate.getMonth(), 1)), end: new Date(Date.UTC(localDate.getFullYear(), localDate.getMonth() + 1, 0, 23, 59, 59)) };
        }

        function updatePeriodDisplay() {
            const label = document.getElementById("currentPeriodLabel");
            if (currentPeriodType === "year") label.textContent = `Năm ${currentDate.getFullYear()}`;
            else if (currentPeriodType === "week") {
                const { start, end } = getPeriodBoundsOverride(currentDate, "week");
                label.textContent = `${start.getDate()}/${start.getMonth()+1} - ${end.getDate()}/${end.getMonth()+1}`;
            } else label.textContent = `Tháng ${currentDate.getMonth()+1}/${currentDate.getFullYear()}`;
        }

        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'error' ? 'error' : ''}`;
            toast.innerHTML = `<i class="fa-solid ${type === 'error' ? 'fa-circle-xmark' : 'fa-check-circle'}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3000);
        };

        function showCustomConfirm(message) {
            return new Promise((resolve) => {
                const modal = document.getElementById('customConfirmModal');
                const btnCancel = document.getElementById('btnConfirmCancel');
                const btnProceed = document.getElementById('btnConfirmProceed');
                document.getElementById('confirmMessage').textContent = message;
                modal.style.display = 'flex';
                const onCancel = () => { modal.style.display = 'none'; resolve(false); cleanup(); };
                const onProceed = () => { modal.style.display = 'none'; resolve(true); cleanup(); };
                const cleanup = () => { btnCancel.removeEventListener('click', onCancel); btnProceed.removeEventListener('click', onProceed); };
                btnCancel.addEventListener('click', onCancel); btnProceed.addEventListener('click', onProceed);
            });
        }

        function formatPlanMoney(amount) {
            const cur = (window.planCurrency || "usd").toUpperCase();
            return new Intl.NumberFormat(cur === 'USD' ? 'en-US' : 'vi-VN', { style: 'currency', currency: cur }).format(amount);
        }

        // ================= JARS LOGIC =================
        function filterJars() {
            const searchTerm = document.getElementById('jarSearchInput').value.toLowerCase();
            const statusFilter = document.getElementById('jarStatusFilter').value;
            const container = document.getElementById('jarsContainer');
            const jarCards = container.querySelectorAll('.jar-card');

            jarCards.forEach(card => {
                // 1. Tìm tên hũ
                const nameEl = card.querySelector('div[style*="font-weight:bold"]');
                const jarName = nameEl ? nameEl.innerText.toLowerCase() : "";
                
                // 2. 💡 CÁCH LẤY PHẦN TRĂM MỚI: Lấy trực tiếp từ style width của thanh progress
                const progressBar = card.querySelector('.progress-bar');
                const percent = progressBar ? parseFloat(progressBar.style.width) : 0;
                
                const matchesSearch = jarName.includes(searchTerm);
                
                let matchesStatus = true;
                if (statusFilter === 'completed') {
                    // Đã đạt goal là phải từ 100% trở lên
                    matchesStatus = (percent >= 100);
                } else if (statusFilter === 'in_progress') {
                    // Chưa đạt là phải nhỏ hơn 100%
                    matchesStatus = (percent < 100);
                }

                if (matchesSearch && matchesStatus) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });

            // Kiểm tra và hiển thị thông báo trống
            const hasResults = Array.from(jarCards).some(c => c.style.display === 'block');
            let emptyMsg = document.getElementById('jarEmptySearchMsg');
            
            if (!hasResults && jarCards.length > 0) {
                if (!emptyMsg) {
                    container.insertAdjacentHTML('afterend', 
                        '<p id="jarEmptySearchMsg" style="text-align: center; color: var(--text-secondary); font-style: italic; margin-top: 10px;">Không tìm thấy hũ phù hợp.</p>');
                }
            } else if (emptyMsg) {
                emptyMsg.remove();
            }
        }

        function toggleJarSetup() {
            const container = document.getElementById('jarSetupContainer');
            container.style.display = container.style.display === 'none' ? 'block' : 'none';
            if (container.style.display === 'block') initJarSetupUI();
        }

        async function initJarSetupUI() {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/planning/jars', { headers: { 'Authorization': `Bearer ${token}` } });
            const jars = await res.json();
            allJarsCache = jars;
            const container = document.getElementById('jarRowsContainer');
            container.innerHTML = '';
            if (jars.length === 0) addJarRow(null, "Chi tiêu", 50, 1000000);
            else jars.forEach(j => addJarRow(j.id, j.name, j.percent, j.goal_amount));
        }

        function addJarRow(id = null, name = "", percent = 0, goal = 0) {
            const container = document.getElementById('jarRowsContainer');
            const rate = window.planRates[window.planCurrency] || 1;
            const row = document.createElement('div');
            row.className = 'jar-row-edit';
            row.dataset.id = id || "";
            row.style = "background: var(--bg-primary); padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); display: grid; grid-template-columns: 2fr 0.8fr 1.5fr 40px; gap: 8px; align-items: center;";
            row.innerHTML = `
                <input type="text" class="wizard-input jar-name" placeholder="Tên" value="${name}">
                <input type="number" class="wizard-input jar-percent" placeholder="%" value="${percent}">
                <input type="text" class="wizard-input jar-goal" placeholder="Mục tiêu" value="${(goal/rate).toFixed(0)}" oninput="formatCurrencyInput(this)">
                <button onclick="deleteJarFromUI(this, ${id})" style="background:none; border:none; color:#ff4d4d; cursor:pointer;"><i class="fa-solid fa-trash-can"></i></button>`;
            container.appendChild(row);
        }

        async function deleteJarFromUI(btn, jarId) {
            // TRƯỜNG HỢP 1: Hũ mới thêm tay, chưa bấm "Lưu Cấu Hình" (ID chưa tồn tại hoặc là null)
            if (!jarId || jarId === "null" || jarId === undefined) {
                btn.parentElement.remove();
                return;
            }

            // TRƯỜNG HỢP 2: Hũ đã tồn tại trong Database
            const ok = await showCustomConfirm("Bạn muốn xóa quỹ này? Lưu ý: Hũ phải hết tiền mới xóa được.");
            if (!ok) return;

            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`/api/planning/jars/${jarId}`, { 
                    method: 'DELETE', 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });

                if (res.ok) {
                    showToast("Đã xóa hũ thành công!", "success");
                    btn.parentElement.remove();
                    // Tải lại dữ liệu để đồng bộ các con số
                    await loadPlanningData();
                } else {
                    const err = await res.json();
                    // Hiển thị lỗi chi tiết (VD: Hũ còn tiền không cho xóa)
                    showToast(err.detail || "Không thể xóa hũ này!", "error");
                }
            } catch (e) {
                console.error("Lỗi xóa hũ:", e);
                showToast("Lỗi kết nối máy chủ!", "error");
            }
        }

        async function saveJarsBulk() {
            const rows = document.querySelectorAll('.jar-row-edit');
            const jarsData = [];
            const rate = window.planRates[window.planCurrency] || 1;
            
            let totalPercent = 0;
            let hasError = false;
            let errorMsg = "";

            // Regex: Chỉ cho phép chữ cái, số, khoảng trắng, gạch ngang, gạch dưới
            const nameRegex = /^[a-zA-Z0-9\sÀ-ỹ\-_]+$/;
            
            // 💡 CHỐT CHẶN MỚI: Cuốn sổ lưu các tên hũ đã quét qua
            const seenNames = new Set(); 

            for (let row of rows) {
                // Tự động chuẩn hóa: Xóa khoảng trắng thừa ở 2 đầu
                let name = row.querySelector('.jar-name').value.trim(); 
                const percent = parseFloat(row.querySelector('.jar-percent').value) || 0;
                const goalRaw = row.querySelector('.jar-goal').value.trim().replace(/,/g, '');
                const goal = Number(goalRaw);

                // 1. Validate Tên hũ cơ bản
                if (!name) { 
                    hasError = true; errorMsg = "Tên hũ không được để trống!"; break; 
                }
                if (name.length > 50) {
                    hasError = true; errorMsg = `Tên hũ "${name}" quá dài (tối đa 50 ký tự)!`; break;
                }
                if (!nameRegex.test(name)) {
                    hasError = true; errorMsg = `Tên hũ "${name}" chứa ký tự không hợp lệ!`; break;
                }

                // 2. 💡 VALIDATE TRÙNG TÊN (Chuyển hết về chữ thường để so sánh cho chuẩn)
                const lowerName = name.toLowerCase();
                if (seenNames.has(lowerName)) {
                    hasError = true; 
                    errorMsg = `Hũ "${name}" bị trùng lặp. Vui lòng đặt tên khác nhau!`; 
                    break;
                }
                seenNames.add(lowerName); // Thêm tên hợp lệ vào sổ để check các dòng tiếp theo

                // 3. Validate % trích
                if (percent < 0 || percent > 100) {
                    hasError = true; errorMsg = `Phần trăm của hũ "${name}" phải từ 0 đến 100!`; break;
                }

                // 4. Validate Mục tiêu
                if (goalRaw === "" || isNaN(goal) || goal < 0) {
                    hasError = true; errorMsg = `Mục tiêu của hũ "${name}" không hợp lệ!`; break;
                }
                if (goal > 1000000000000) { 
                    hasError = true; errorMsg = `Mục tiêu của hũ "${name}" quá lớn. Vui lòng nhập số hợp lệ!`; break;
                }

                // 5. Chuẩn hóa tên cho đẹp: Chữ cái đầu viết hoa (VD: "chi tiêu" -> "Chi tiêu")
                name = name.charAt(0).toUpperCase() + name.slice(1);

                jarsData.push({ 
                    id: row.dataset.id ? parseInt(row.dataset.id) : null, 
                    name: name, 
                    percent: percent, 
                    goal_amount: goal * rate 
                });
                totalPercent += percent;
            }

            if (hasError) { 
                showToast(errorMsg, "error"); 
                return; 
            }

            if (totalPercent > 100) {
                showToast(`Tổng tỷ lệ trích đang là ${totalPercent}%. Không được vượt quá 100%!`, "error");
                return;
            }

            const btnSave = document.getElementById('btnSaveJars');
            const originalText = btnSave.innerHTML;
            btnSave.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang lưu...';
            btnSave.disabled = true;

            const token = localStorage.getItem('token');
            try {
                const res = await fetch('/api/planning/jars/bulk', { 
                    method: 'POST', 
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(jarsData) 
                });
                
                if (res.ok) { 
                    showToast("Đã lưu cấu hình Quỹ!", "success"); 
                    document.getElementById('jarSetupContainer').style.display = 'none';
                    await loadPlanningData(); 
                } else {
                    const err = await res.json();
                    showToast(err.detail || "Lỗi máy chủ khi lưu!", "error");
                }
            } catch (e) { 
                showToast("Lỗi kết nối mạng!", "error"); 
            }

            btnSave.innerHTML = originalText;
            btnSave.disabled = false;
        }

        // 1. SỬA LẠI HÀM NÀY ĐỂ GỌI LỊCH SỬ KHI MỞ BẢNG
        window.showTransferModal = function(id, name, balance) {
            selectedTargetJarId = id;
            // 💡 Lấy tỷ giá để chia tiền trong Modal
            const rate = window.planRates[window.planCurrency] || 1;
            
            document.getElementById('transferTitle').innerText = `Quỹ: ${name}`;
            document.getElementById('transferModal').style.display = 'flex';
            document.getElementById('transferAmount').value = '';
            
            // 💡 Cập nhật danh sách "Đến hũ nhận" và chia tỷ giá
            document.getElementById('transferTargetJar').innerHTML = allJarsCache
                .filter(j => j.id !== id)
                .map(j => `<option value="${j.id}">${j.name} (Đang có: ${formatPlanMoney(j.balance / rate)})</option>`)
                .join('');
            switchTransferType('deposit');
        };

        window.switchTransferType = function(type) {
            currentTransferType = type;
            ['btnTabDep', 'btnTabWit', 'btnTabInt'].forEach(id => {
                const btn = document.getElementById(id);
                const active = (id === 'btnTabDep' && type === 'deposit') || (id === 'btnTabWit' && type === 'withdraw') || (id === 'btnTabInt' && type === 'internal');
                btn.style.background = active ? 'var(--accent)' : 'var(--bg-primary)';
                btn.style.color = active ? 'white' : 'var(--text-secondary)';
            });
            document.getElementById('internalSourceGroup').style.display = type === 'internal' ? 'block' : 'none';
            document.getElementById('transferAmountLabel').innerText = type === 'deposit' ? 'Số tiền nạp vào hũ:' : (type === 'withdraw' ? 'Số tiền rút về ví chính:' : 'Số tiền chuyển đi:');
        };

        async function executeTransfer() {
            const amountRaw = document.getElementById('transferAmount').value.replace(/,/g, '');
            const amount = parseFloat(amountRaw);
            if (!amount || amount <= 0) { showToast("Số tiền không hợp lệ!", "error"); return; }
            const rate = window.planRates[window.planCurrency] || 1;
            
            // 💡 ĐẢO NGƯỢC LOGIC CHUYỂN HŨ: Từ Hũ đang chọn -> Hũ Đích
            let fromId = selectedTargetJarId;
            let toId = selectedTargetJarId;
            if (currentTransferType === 'internal') {
                toId = parseInt(document.getElementById('transferTargetJar').value);
            }
            
            const payload = { type: currentTransferType, amount: amount * rate, to_id: toId, from_id: fromId };
            const res = await fetch('/api/planning/jars/transfer', { method: 'POST', headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (res.ok) { showToast("Thành công!", "success"); closeTransferModal(); await loadPlanningData(); }
            else { const err = await res.json(); showToast(err.detail, "error"); }
        }

        async function loadGlobalJarHistory() {
            const listContainer = document.getElementById('globalJarHistoryList');
            const rate = window.planRates[window.planCurrency] || 1; 
            
            try {
                const token = localStorage.getItem('token');
                const res = await fetch('/api/planning/jars/history/all', { headers: { 'Authorization': `Bearer ${token}` } });
                
                if (!res.ok) throw new Error("Lỗi tải dữ liệu");
                let history = await res.json();
                
                if (history.length === 0) {
                    listContainer.innerHTML = '<div style="text-align: center; color: var(--text-secondary); font-style: italic; padding: 15px;">Chưa có giao dịch nạp/rút nào.</div>';
                    return;
                }

                // 💡 BÍ KÍP Ở ĐÂY: ÉP BUỘC SẮP XẾP MỚI NHẤT LÊN ĐẦU
                // 1. Lật ngược danh sách (để những giao dịch cùng 1 ngày không có giờ sẽ tự động ưu tiên cái mới lên trên)
                history.reverse();
                // 2. Sắp xếp lại danh sách chuẩn xác tuyệt đối theo thời gian (từ Mới -> Cũ)
                history.sort((a, b) => new Date(b.date) - new Date(a.date));

                listContainer.innerHTML = history.map(t => {
                    const dateObj = new Date(t.date);
                    const dateStr = dateObj.toLocaleDateString('vi-VN') + ' ' + dateObj.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'});
                    
                    let displayName = t.name;
                    const match = displayName.match(/ ([\d,]+)đ /);
                    if (match) {
                        const rawAmount = parseFloat(match[1].replace(/,/g, ''));
                        const converted = formatPlanMoney(rawAmount / rate); 
                        displayName = displayName.replace(match[0], ` ${converted} `);
                    }

                    return `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--border); background: var(--bg-primary); border-radius: 8px; margin-bottom: 8px; transition: 0.2s;">
                        <div style="flex: 1; padding-right: 15px;">
                            <div style="color: var(--text-primary); font-weight: 500; font-size: 0.95rem;">${displayName}</div>
                        </div>
                        <div style="font-size: 0.8rem; white-space: nowrap; color: var(--accent); background: rgba(138, 43, 226, 0.1); padding: 5px 12px; border-radius: 20px; font-weight: bold; border: 1px solid rgba(138, 43, 226, 0.3);">
                            ${dateStr}
                        </div>
                    </div>`;
                }).join('');
            } catch (e) {
                listContainer.innerHTML = '<div style="text-align: center; color: #ff4d4d; padding: 15px;">Lỗi tải lịch sử!</div>';
            }
        }

        window.closeTransferModal = function() { document.getElementById('transferModal').style.display = 'none'; };


        // ================= BUDGET LOGIC =================
        async function initBudgetInputs() {
            const token = localStorage.getItem('token');
            const rate = window.planRates[window.planCurrency] || 1;
            
            // Lấy khoảng thời gian người dùng đang chọn trên giao diện
            const { start, end } = getPeriodBoundsOverride(currentDate, currentPeriodType);
            const startStr = getISODate(start);
            const endStr = getISODate(end);
            
            try {
                // Nhét tham số thời gian vào API
                const resBudgets = await fetch(`/api/planning/budgets?start_date=${startStr}&end_date=${endStr}&period_type=${currentPeriodType}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const existingBudgets = await resBudgets.json();
                
                const container = document.getElementById('budgetInputsContainer');
                container.innerHTML = '';

                // LỌC TỰ ĐỘNG: Xóa sổ các danh mục bị trùng lặp hoa/thường (VD: Phượt và phượt)
                const uniqueCats = [];
                const seen = new Set();
                window.categoriesList.forEach(cat => {
                    const lowerCat = cat.toLowerCase();
                    if (!seen.has(lowerCat)) {
                        seen.add(lowerCat);
                        uniqueCats.push(cat);
                    }
                });
                window.categoriesList = uniqueCats; // Cập nhật lại giỏ danh mục chuẩn

                // RENDER GIAO DIỆN
                window.categoriesList.forEach(cat => {
                    const found = existingBudgets.find(b => b.category === cat);
                    const currentLimit = found && found.limit_amount > 0 ? (found.limit_amount / rate).toFixed(0) : '';

                    container.innerHTML += `
                        <div class="budget-row-container" style="background-color: var(--bg-primary); padding: 10px 15px; border-radius: 8px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); margin-bottom: 10px;">
                            <span style="flex: 1; color: var(--accent); font-weight: 500;">${cat}</span>
                            <input type="text" class="wizard-input budget-mass-input" 
                                   data-category="${cat}" 
                                   value="${currentLimit}" 
                                   oninput="formatCurrencyInput(this); updateTotalBudgetSum();"
                                   style="width: 120px; margin-bottom: 0; text-align: right;" 
                                   placeholder="0">
                            <button onclick="deleteBudgetRow(this, '${cat}')" style="background: none; border: none; color: #ff4d4d; cursor: pointer; padding: 5px;" data-tooltip="Xóa">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>`;
                });
                updateTotalBudgetSum();
            } catch (e) { console.error("Lỗi nạp budget inputs:", e); }
        }

        function addNewBudgetCategory() {
            const catInput = document.getElementById('newBudgetCategory');
            const amtInput = document.getElementById('newBudgetAmount');
            let catName = catInput.value.trim();
            
            const rawAmount = amtInput.value.trim().replace(/,/g, ''); 
            const limit = Number(rawAmount);

            if (!catName) { showToast("Vui lòng nhập tên danh mục!", "error"); return; }
            if (rawAmount === "" || isNaN(limit) || limit <= 0) {
                showToast("Dữ liệu không hợp lệ! Hạn mức phải là một con số lớn hơn 0.", "error");
                return;
            }

            catName = catName.charAt(0).toUpperCase() + catName.slice(1).toLowerCase();
            const existingCat = window.categoriesList.find(c => c.toLowerCase() === catName.toLowerCase());
            if (existingCat) { catName = existingCat; } 
            else { window.categoriesList.push(catName); }

            const container = document.getElementById('budgetInputsContainer');
            let existingRow = document.querySelector(`.budget-mass-input[data-category="${catName}"]`);
            
            if (existingRow) {
                existingRow.value = rawAmount; 
                existingRow.setAttribute('value', rawAmount); // Đóng đinh giá trị vào thẻ HTML
                existingRow.closest('div').style.display = 'flex'; 
            } else {
                // FIX LỖI BÓNG MA: Dùng insertAdjacentHTML thay vì innerHTML +=
                container.insertAdjacentHTML('beforeend', `
                    <div style="background-color: var(--bg-primary); padding: 10px 15px; border-radius: 8px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); margin-top: 10px;">
                        <span style="flex: 1; color: var(--accent); font-weight: 500;">${catName}</span>
                        <input type="text" class="wizard-input budget-mass-input" 
                               data-category="${catName}" 
                               value="${rawAmount}" 
                               oninput="formatCurrencyInput(this); updateTotalBudgetSum();"
                               style="width: 120px; margin-bottom: 0; text-align: right;" 
                               placeholder="0">
                        <button onclick="deleteBudgetRow(this)" style="background: none; border: none; color: #ff4d4d; cursor: pointer; padding: 5px;" data-tooltip="Xóa">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>`);
            }

            updateTotalBudgetSum();
            catInput.value = ''; amtInput.value = '';
            showToast(`Đã thêm hạn mức cho "${catName}". Nhớ bấm "Lưu Tất Cả" nhé!`, "success");
        }

        window.deleteBudgetRow = function(btnElement) {
            const row = btnElement.closest('div');
            const input = row.querySelector('.budget-mass-input');
            input.value = "0"; 
            input.setAttribute('value', '0'); // Cập nhật thẳng vào thẻ HTML để không bị JS nhầm
            row.style.display = 'none'; 
            updateTotalBudgetSum();
        };

        async function deleteBudget(category) {
            const isConfirmed = await showCustomConfirm(`Bạn có chắc chắn muốn xóa ngân sách của mục "${category}" không?`);
            if (!isConfirmed) return;

            const { start, end } = getPeriodBoundsOverride(currentDate, currentPeriodType);
            const startStr = getISODate(start);
            const endStr = getISODate(end);

            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`/api/planning/budgets/${encodeURIComponent(category)}?start_date=${startStr}&end_date=${endStr}&period_type=${currentPeriodType}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    showToast("Đã xóa ngân sách thành công!", "success");
                    const input = document.querySelector(`.budget-mass-input[data-category="${category}"]`);
                    if(input) { 
                        input.value = '0'; 
                        input.setAttribute('value', '0'); // Đóng đinh giá trị
                        updateTotalBudgetSum(); 
                    }
                    await loadPlanningData(); 
                }
            } catch (e) { showToast("Có lỗi xảy ra khi xóa!", "error"); }
        }

        function updateTotalBudgetSum() {
            let total = 0;
            document.querySelectorAll('.budget-mass-input').forEach(i => total += parseFloat(i.value.replace(/,/g, '')) || 0);
            document.getElementById('totalBudgetDisplay').innerText = formatPlanMoney(total);
        }

        async function saveBudgetsBulk() {
            const inputs = document.querySelectorAll('.budget-mass-input');
            const budgetsData = [];
            const rate = window.planRates[window.planCurrency] || 1;
            let hasError = false;

            inputs.forEach(i => {
                const rawVal = i.value.trim().replace(/,/g, '');
                if (rawVal === "" || rawVal === "0") {
                    budgetsData.push({ category: i.dataset.category, limit_amount: 0 });
                    return;
                }
                const val = Number(rawVal);
                if (isNaN(val) || val < 0) { hasError = true; } 
                else { budgetsData.push({ category: i.dataset.category, limit_amount: val * rate }); }
            });

            if (hasError) { showToast("Dữ liệu hạn mức không hợp lệ!", "error"); return; }

            const token = localStorage.getItem('token');
            
            // BƯỚC 1: PHẢI LƯU DANH MỤC TRƯỚC ĐỂ BACKEND KHÔNG BÁO LỖI 400
            try {
                const payloadCats = {
                    expenseCategories: window.categoriesList,
                    incomeCategories: window.incomeCategories || ["Lương", "Thưởng", "Đầu tư", "Khác"]
                };
                await fetch('/api/categories/edit', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payloadCats)
                });
            } catch(e) {
                console.error("Lỗi đồng bộ danh mục:", e);
            }

            // BƯỚC 2: LƯU NGÂN SÁCH (KHI BACKEND ĐÃ NHẬN DANH MỤC MỚI)
            const { start, end } = getPeriodBoundsOverride(currentDate, currentPeriodType);
            const payload = { 
                start_date: getISODate(start), 
                end_date: getISODate(end), 
                period_type: currentPeriodType, 
                budgets: budgetsData 
            };
            
            try {
                const res = await fetch('/api/planning/budgets/bulk', { 
                    method: 'POST', 
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                
                if (res.ok) { 
                    showToast("Đã lưu tất cả ngân sách thành công!", "success"); 
                    await loadPlanningData(); 
                } else {
                    const err = await res.json();
                    // Hiển thị thẳng lỗi từ Backend ra màn hình nếu có
                    showToast(err.detail || "Lỗi khi lưu dữ liệu lên máy chủ!", "error");
                }
            } catch (e) { showToast("Lỗi kết nối mạng!", "error"); }
        }

        // ================= MAIN LOADER =================
        async function loadPlanningData() {
            const token = localStorage.getItem('token');
            const rate = window.planRates[window.planCurrency] || 1;
            const headers = { 'Authorization': `Bearer ${token}` };
            const { start, end } = getPeriodBoundsOverride(currentDate, currentPeriodType);

            try {
                const resJars = await fetch('/api/planning/jars', { headers });
                const jars = await resJars.json();
                allJarsCache = jars;
                const jContainer = document.getElementById('jarsContainer');
                jContainer.innerHTML = '';
                jars.forEach(j => {
                    const rate = window.planRates[window.planCurrency] || 1;
                    const percent = j.goal_amount > 0 ? Math.min((j.balance / j.goal_amount) * 100, 100) : 0;
                    
                    // 💡 NHẮC NHỞ MỤC TIÊU (Mục 14 bài test)
                    let goalHint = "";
                    let hintColor = "var(--text-secondary)";
                    
                    if (percent >= 100) {
                        goalHint = "Tuyệt vời! Bạn đã hoàn thành mục tiêu.";
                        hintColor = "#4ade80";
                    } else if (percent >= 50) {
                        goalHint = " Đã đi được nửa chặng đường! Cố lên.";
                        hintColor = "#fbbf24";
                    } else if (j.goal_amount > 0) {
                        goalHint = " Hãy tích lũy thêm để sớm đạt mục tiêu nhé.";
                    }

                    jContainer.innerHTML += `
                        <div class="jar-card" onclick="showTransferModal(${j.id}, '${j.name}', ${j.balance})">
                            <i class="fa-solid fa-piggy-bank" style="font-size:1.8rem;color:var(--accent);"></i>
                            <div style="font-weight:bold; color: var(--text-primary); margin:8px 0;">${j.name}</div>
                            <div style="color:#4ade80; font-size: 1.1rem; font-weight:bold;">${formatPlanMoney(j.balance / rate)}</div>
                            <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 5px;">Mục tiêu: ${formatPlanMoney(j.goal_amount / rate)}</div>
                            
                            <div class="progress-container" style="height: 6px;">
                                <div class="progress-bar" style="width: ${percent}%; background: #4ade80;"></div>
                            </div>
                            
                            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; margin-top: 5px;">
                                <span style="color: ${hintColor}; font-weight: 500;">${goalHint}</span>
                                <span>${percent.toFixed(1)}%</span>
                            </div>
                        </div>`;
                });

                const resBudgets = await fetch(`/api/planning/budgets?start_date=${getISODate(start)}&end_date=${getISODate(end)}&period_type=${currentPeriodType}`, { headers });
                const budgets = await resBudgets.json();
                const bContainer = document.getElementById('budgetsContainer');
                bContainer.innerHTML = '';
                budgets.filter(b => b.limit_amount > 0).forEach(b => {
                    const percent = Math.min((b.spent_amount / b.limit_amount) * 100, 100);
                    const daysLeft = Math.max(1, Math.ceil((end - new Date()) / (1000 * 60 * 60 * 24)));
                    const suggest = b.limit_amount > b.spent_amount ? `Gợi ý: Tiêu tối đa <b>${formatPlanMoney((b.limit_amount - b.spent_amount) / (rate * daysLeft))}</b>/ngày.` : `<span style="color:#ff4d4d;">Đã hết ngân sách!</span>`;
                    bContainer.innerHTML += `
                        <div class="budget-card">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                                <span style="font-weight: bold; color: var(--text-primary);">${b.category}</span>
                                <span style="color: var(--text-secondary); font-size: 0.85rem;">${formatPlanMoney(b.spent_amount/rate)} / ${formatPlanMoney(b.limit_amount/rate)}</span>
                            </div>
                            <div class="progress-container"><div class="progress-bar" style="width: ${percent}%; background: ${percent > 90 ? '#f87171' : (percent > 75 ? '#fbbf24' : '#4ade80')};"></div></div>
                            <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 8px;"><i class="fa-solid fa-lightbulb" style="color: #fbbf24;"></i> ${suggest}</div>
                        </div>`;
                });
                await loadGlobalJarHistory();
            } catch (e) { console.error(e); }
            // Cuối hàm loadPlanningData
            filterJars();
        }

        // --- EVENT LISTENERS ---
        document.getElementById("periodSelect").addEventListener("change", (e) => { currentPeriodType = e.target.value; updatePeriodDisplay(); initBudgetInputs(); loadPlanningData(); });
        document.getElementById("prevPeriod").addEventListener("click", () => { 
            if (currentPeriodType === "month") currentDate.setMonth(currentDate.getMonth() - 1);
            else if (currentPeriodType === "year") currentDate.setFullYear(currentDate.getFullYear() - 1);
            else currentDate.setDate(currentDate.getDate() - 7);
            updatePeriodDisplay(); initBudgetInputs(); loadPlanningData();
        });
        document.getElementById("nextPeriod").addEventListener("click", () => { 
            if (currentPeriodType === "month") currentDate.setMonth(currentDate.getMonth() + 1);
            else if (currentPeriodType === "year") currentDate.setFullYear(currentDate.getFullYear() + 1);
            else currentDate.setDate(currentDate.getDate() + 7);
            updatePeriodDisplay(); initBudgetInputs(); loadPlanningData();
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if(!token) return;
            // Giả lập đồng bộ config categories
            const res = await fetch("/api/config", { headers: { 'Authorization': `Bearer ${token}` } });
            const config = await res.json();
            window.categoriesList = config.expenseCategories || ["Ăn uống", "Đi lại"];
            window.planCurrency = config.currency || "usd";
            window.planRates = { "vnd": 1, "usd": 25400 };
            
            updatePeriodDisplay();
            initBudgetInputs();
            loadPlanningData();
        });

        function showLogoutModal() { document.getElementById('logoutConfirmModal').style.display = 'flex'; }
        function closeLogoutModal() { document.getElementById('logoutConfirmModal').style.display = 'none'; }
        function proceedLogout() { localStorage.removeItem('token'); window.location.href = '/login'; }
    </script>

    <!-- MODAL ĐĂNG XUẤT -->
    <div id="logoutConfirmModal" class="modal" style="display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); align-items: center; justify-content: center;">
        <div style="background-color: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; width: 90%; max-width: 400px; padding: 25px; text-align: center;">
            <h3 style="color: var(--accent); margin-top: 0; margin-bottom: 15px;"><i class="fa-solid fa-right-from-bracket"></i> Đăng Xuất?</h3>
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
                <button onclick="closeLogoutModal()" style="flex: 1; padding: 10px; background: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border); border-radius: 6px; cursor: pointer;">Hủy</button>
                <button onclick="proceedLogout()" style="flex: 1; padding: 10px; background: #ff4d4d; color: white; border: none; border-radius: 6px; cursor: pointer;">Đăng Xuất</button>
            </div>
        </div>
    </div>
    <script src="/static/chatbot.js"></script>
</body>
