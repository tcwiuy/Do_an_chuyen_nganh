<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biến động Thu Chi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/chart.min.js"></script>
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'system';
            if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
            else if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();
    </script>
    <style>
        /* HIỆU ỨNG NÚT BẤM CHO 3 THẺ */
        .trend-card { 
            padding: 20px; text-align: center; display: flex; flex-direction: column; justify-content: center; position: relative;
            cursor: pointer; transition: all 0.2s ease; border: 1px solid var(--border);
            background: var(--bg-secondary);
        }
        .trend-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .trend-card.active { border-color: var(--accent); background: var(--bg-secondary); }
        
        .trend-title { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 8px; font-weight: 500; }
        .trend-value { font-size: 1.8rem; font-weight: bold; margin-bottom: 5px; }
        
        .badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; }
        .badge.up.good { background: #4ade8020; color: #4ade80; } 
        .badge.down.bad { background: #f8717120; color: #f87171; } 
        .badge.up.bad { background: #f8717120; color: #f87171; }   
        .badge.down.good { background: #4ade8020; color: #4ade80; } 
        .badge.neutral { background: #2a2a40; color: #a1a1aa; }

        .trend-category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--bg-primary);
            margin-bottom: 10px;
        }

        .trend-category-item:last-child {
            margin-bottom: 0;
        }
        .progress-bar-bg { width: 100%; background: rgba(105, 175, 222, 0.20); height: 6px; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .progress-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

        /* Dùng layout container chung trong /static/style.css để đồng bộ kích thước */

        .nav-button,
        .view-button {
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .form-container {
            border: 1px solid var(--border);
        }

        h2 {
            margin-top: 16px;
            margin-bottom: 14px !important;
        }

        #btnWeek, #btnMonth, #btnYear {
            min-width: 0;
            border-radius: 999px;
            padding-inline: 18px;
        }

        #btnWeek.active, #btnMonth.active, #btnYear.active {
            background: var(--accent) !important;
            border-color: var(--accent) !important;
            color: var(--bg-primary) !important;
        }

        #cardIncome, #cardExpense, #cardBalance {
            border-radius: 24px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        #cardExpense.active {
            border-color: var(--accent) !important;
        }

        .trend-title { color: var(--text-secondary); }

        .trend-value {
            font-size: 1.9rem;
            letter-spacing: -0.04em;
            color: var(--text-primary) !important;
        }

        .badge {
            border-radius: 999px;
            padding: 5px 10px;
        }

        #chartTitle, #topCategoriesTitle { color: var(--text-primary) !important; }

        .trend-summary-line {
            margin-bottom: 14px;
            padding: 14px 16px;
            border-radius: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .trend-summary-line.good { background: linear-gradient(135deg, rgba(74, 222, 128, 0.15), rgba(74, 222, 128, 0.05)); color: #1f9d55; border-left: 4px solid #4ade80; }
        .trend-summary-line.bad { background: linear-gradient(135deg, rgba(249, 115, 22, 0.15), rgba(249, 115, 22, 0.05)); color: #d97706; border-left: 4px solid #f97316; }

        #topCategoriesContainer .trend-category-item {
            border-color: var(--border);
        }

        #compareToggle {
            accent-color: var(--accent);
        }

        .segmented {
            display: flex;
            width: 100%;
            gap: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px;
        }

        .segmented button {
            flex: 1;
            border-radius: 999px;
            padding: 10px 12px;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-weight: 700;
            cursor: pointer;
            transition: background 0.18s ease, transform 0.18s ease, color 0.18s ease;
        }

        .segmented button.active {
            background: var(--bg-primary);
            color: var(--accent);
        }

        .trend-total {
            border-radius: 22px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            padding: 18px 16px;
            text-align: center;
            margin-bottom: 16px;
        }

        .trend-total .label {
            color: var(--text-secondary);
            font-weight: 700;
            letter-spacing: -0.01em;
            margin-bottom: 4px;
        }

        .trend-total .value {
            font-size: 2.1rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            color: var(--text-primary);
        }

        .delta-pill {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            border: 1px solid var(--border);
        }

        .delta-pill.good { background: rgba(74, 222, 128, 0.14); color: #1f9d55; }
        .delta-pill.bad { background: rgba(249, 115, 22, 0.12); color: #d97706; }
        .delta-pill .sub {
            font-weight: 700;
            opacity: 0.9;
        }

        .trend-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .trend-section-header h3 {
            margin: 0;
        }

        .compare-inline {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .container {
                padding-inline: 12px;
            }

            .form-container > div:first-child {
                flex-direction: column;
                align-items: stretch !important;
            }

            .form-container > div:first-child > div {
                justify-content: center;
            }

            .form-container > div:first-child button,
            .form-container > div:first-child select {
                width: 100%;
            }

            .form-container > div:first-child + div {
                margin-top: 10px;
            }

            .trend-value {
                font-size: 1.6rem;
            }

            .chart-container {
                flex-direction: column;
            }

            .chart-left-wrapper {
                padding-right: 0 !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="nav-bar">
                <a href="/" class="view-button" data-tooltip="Trang Chủ"><i class="fa-solid fa-chart-pie"></i></a>
                <a href="/history" class="view-button" data-tooltip="Hoạt động"><i class="fa-solid fa-clock-rotate-left"></i></a>
                <a href="/trends" class="view-button active" data-tooltip="Biến động"><i class="fa-solid fa-chart-line"></i></a>
                <a href="/suggestions" class="view-button" data-tooltip="Gợi Ý AI"><i class="fa-solid fa-lightbulb"></i></a>
                <a href="/planning" class="view-button" data-tooltip="Ngân sách"><i class="fa-solid fa-piggy-bank"></i></a>
                <a href="/settings" class="view-button" data-tooltip="Cài Đặt"><i class="fa-solid fa-gear"></i></a>
                
                <!-- ĐÃ SỬA ONCLICK Ở DÒNG DƯỚI ĐÂY -->
                <a href="javascript:void(0)" class="view-button" onclick="showLogoutModal()" data-tooltip="Đăng Xuất" style="margin-left: auto; color: #ff4d4d;"><i class="fa-solid fa-right-from-bracket"></i></a>
            </div>
        </header>

        <h2 style="text-align: center; margin-bottom: 20px;"><i class="fa-solid fa-chart-line"></i> Biến động thu chi</h2>

        <div class="form-container" style="padding: 16px 16px; margin-bottom: 16px;">
            <div class="segmented" style="margin-bottom: 12px;">
                <button id="btnWeek">Theo tuần</button>
                <button id="btnMonth" class="active">Theo tháng</button>
                <button id="btnYear">Theo năm</button>
            </div>

            <div class="segmented">
                <button id="btnMetricIncome">Thu nhập</button>
                <button id="btnMetricExpense" class="active">Chi tiêu</button>
                <button id="btnMetricBalance">Chênh lệch</button>
            </div>
        </div>

        <div style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; padding: 0 10px;">
            <button id="prevPeriod" class="nav-button" style="border-radius: 50%; width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-chevron-left"></i></button>
            <div id="currentPeriodLabel" style="text-align: center; min-width: 180px; color: var(--text-primary); font-weight: bold; font-size: 1.05rem; line-height: 1.4;"></div>
            <button id="nextPeriod" class="nav-button" style="border-radius: 50%; width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <div class="trend-total">
            <div id="trendTotalLabel" class="label">Đang tổng hợp dữ liệu...</div>
            <div id="trendTotalValue" class="value">0 ₫</div>
            <div id="trendDeltaPill" class="delta-pill good" style="display:none;"></div>
        </div>

        <div class="form-container" style="padding: 20px; margin-bottom: 20px;">
            <div class="trend-section-header">
                <h3 id="chartTitle" style="text-align: left; font-size: 1.1rem;">Biến động</h3>
                <label class="compare-inline" for="compareToggle">
                    <span>So với cùng kỳ</span>
                    <input type="checkbox" id="compareToggle" class="styled-checkbox" style="transform: scale(1.1); cursor: pointer;" checked>
                </label>
            </div>
            <div style="position: relative; height: 300px; width: 100%;">
                <canvas id="trendChart"></canvas>
            </div>
        </div>

        <div class="form-container" style="padding: 20px;">
            <h3 id="topCategoriesTitle" style="margin-top: 0; color: var(--text-primary); font-size: 1.1rem;"><i class="fa-solid fa-layer-group"></i> Danh mục</h3>
            <div id="topCategoriesContainer">
                <div style="text-align: center; color: var(--text-secondary); padding: 10px;">Đang tính toán...</div>
            </div>
        </div>

    </div>
    <!-- MODAL XÁC NHẬN ĐĂNG XUẤT ĐẸP -->
    <div id="logoutConfirmModal" class="modal" style="display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); align-items: center; justify-content: center;">
        <div style="background-color: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; width: 90%; max-width: 400px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center;">
            <h3 style="color: var(--accent); margin-top: 0; margin-bottom: 15px;">
                <i class="fa-solid fa-right-from-bracket"></i> Xác nhận Đăng Xuất
            </h3>
            <p style="color: var(--text-secondary); line-height: 1.6; margin-bottom: 25px; font-size: 15px;">Bạn có chắc chắn muốn đăng xuất khỏi ExpenseOwl không?</p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button onclick="closeLogoutModal()" style="flex: 1; padding: 10px 20px; background-color: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;">Hủy bỏ</button>
                <button onclick="proceedLogout()" style="flex: 1; padding: 10px 20px; background-color: #ff4d4d; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;">Đăng Xuất</button>
            </div>
        </div>
    </div>
    <script src="/static/functions.js"></script>
    <script src="/static/trend.js"></script>
    <script src="/static/chatbot.js"></script>
    <script>
    // HÀM HIỂN THỊ BẢNG ĐĂNG XUẤT
        function showLogoutModal() {
            document.getElementById('logoutConfirmModal').style.display = 'flex';
        }

        // HÀM ẨN BẢNG ĐĂNG XUẤT
        function closeLogoutModal() {
            document.getElementById('logoutConfirmModal').style.display = 'none';
        }

        // HÀM THỰC THI ĐĂNG XUẤT
        function proceedLogout() {
            closeLogoutModal();
            // Gọi hàm logout gốc của bạn (hoặc thực thi logic xóa token)
            if (typeof logout === 'function') {
                logout();
            } else {
                localStorage.removeItem('token');
                window.location.href = '/login';
            }
        }
    </script>
</body>
</html>
