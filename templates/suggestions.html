<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <!-- 💡 Khóa tính năng Zoom (Chụm ngón tay) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'system';
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <title>Kế Hoạch Tiết Kiệm</title>
    <style>
        /* --- BẮT ĐẦU CSS CHUẨN HÓA GIAO DIỆN --- */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            overflow-x: hidden !important; 
            overflow-y: auto !important;   
            width: 100%;
            max-width: 100vw;
            margin: 0;
            padding: 0;
        }

        .container {
            overflow-x: hidden !important;
            width: 100%;
            max-width: 100vw;
        }

        /* CSS MENU 3 CHẤM CHO ĐIỆN THOẠI */
        .more-menu-container {
            display: none; 
            position: relative;
            margin-left: auto; 
        }
        .more-dropdown {
            display: none;
            position: absolute;
            top: 110%;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            flex-direction: column;
            min-width: 180px;
            z-index: 1000;
            overflow: hidden;
        }
        .more-dropdown.show {
            display: flex;
            animation: fadeIn 0.2s ease;
        }
        .more-dropdown a {
            padding: 12px 15px;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            transition: background 0.2s;
            border-bottom: 1px solid var(--border);
        }
        .more-dropdown a:last-child {
            border-bottom: none;
        }
        .more-dropdown a:hover {
            background: var(--bg-primary);
        }
        .more-dropdown a i {
            width: 20px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .hide-on-mobile {
                display: none !important;
            }
            .more-menu-container {
                display: block;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* --- KẾT THÚC CSS CHUẨN HÓA --- */

        /* =========================================================
           💡 ÉP KHUÔN GIAO DIỆN BẤT CHẤP DỮ LIỆU TỪ JAVASCRIPT
           ========================================================= */

        /* 1. Xóa sạch mọi màu nền bị JS gán cứng */
        #suggestionsSummary [style*="background"], 
        #suggestionsList [style*="background"] {
            background: transparent !important;
            background-color: transparent !important;
        }

        /* 2. Ép màu chuẩn cho KHUNG TO (Card chính) giống hệt khung Lập Kế Hoạch */
        #suggestionsSummary, 
        #suggestionsList > div,
        .suggestion-card {
            background-color: var(--bg-secondary) !important;
            border: 1px solid var(--border) !important;
            border-radius: 12px !important;
            padding: 20px !important;
            margin-bottom: 20px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05) !important;
            box-sizing: border-box !important;
            overflow: hidden !important; /* Chống tràn khung */
        }

        /* 3. Ép màu chuẩn cho CÁC HỘP NHỎ (Mức tiêu hiện tại, Khả thi...) */
        #suggestionsSummary div[style*="padding"], 
        #suggestionsList div[style*="padding"] {
            background-color: var(--bg-primary) !important;
            border: 1px solid var(--border) !important;
            border-radius: 8px !important;
            white-space: normal !important; /* Chống tràn chữ */
        }

        /* Đảm bảo các hàng (flex) có thể xuống dòng, KHÔNG BỊ CHÈN RA NGOÀI MÀN HÌNH */
        #suggestionsSummary div[style*="display: flex"], 
        #suggestionsList div[style*="display: flex"],
        #suggestionsList div[style*="display:flex"] {
            background-color: transparent !important;
            border: none !important;
            padding: 0 !important;
            flex-wrap: wrap !important; /* Quan trọng: Cho phép rớt dòng */
            gap: 10px !important; 
        }

        /* 4. Đặc trị hộp "Cách thực hiện" (ĐÃ BỎ MÀU TÍM, DÙNG MÀU CHUẨN) */
        #suggestionsList div[style*="border-left"] {
            background-color: var(--bg-primary) !important; /* Màu nền hoàn toàn khớp với hệ thống */
            border-left: 4px solid var(--accent) !important;
            padding: 15px !important;
            margin-top: 15px !important;
        }

        /* 5. Ép màu CHỮ và CÂN BẰNG CHỮ để chống tràn lề */
        #suggestionsSummary div, #suggestionsList div,
        #suggestionsSummary p, #suggestionsList p {
            color: var(--text-secondary) !important;
            text-shadow: none !important;
            line-height: 1.6 !important;
            white-space: normal !important; /* Cho phép chữ xuống dòng tự nhiên */
            word-break: break-word !important; /* Bẻ từ nếu đoạn text quá dài */
            overflow-wrap: break-word !important;
        }
        
        #suggestionsSummary b, #suggestionsSummary strong, 
        #suggestionsList b, #suggestionsList strong {
            color: var(--text-primary) !important;
        }

        #suggestionsSummary h3, #suggestionsSummary h4, 
        #suggestionsList h3, #suggestionsList h4 {
            color: var(--accent) !important;
            margin-top: 0 !important;
            border-bottom: 1px dashed var(--border) !important;
            padding-bottom: 10px !important;
            white-space: normal !important;
        }

        /* 6. Nút "Giảm X tiền" ở góc thẻ */
        #suggestionsList span[style*="border"] {
            background-color: var(--bg-primary) !important;
            border: 1px solid #4ade80 !important;
            color: #4ade80 !important;
            border-radius: 6px !important;
            padding: 5px 10px !important;
            display: inline-block !important; /* Tránh bị méo form */
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Thanh điều hướng -->
        <header>
            <div class="nav-bar">
                <a href="/" class="view-button" data-tooltip="Trang Chủ"><i class="fa-solid fa-chart-pie"></i></a>
                <a href="/history" class="view-button" data-tooltip="Hoạt động"><i class="fa-solid fa-clock-rotate-left"></i></a>
                <a href="/trends" class="view-button" data-tooltip="Biến động"><i class="fa-solid fa-chart-line"></i></a>
                <a href="/planning" class="view-button" data-tooltip="Ngân sách"><i class="fa-solid fa-piggy-bank"></i></a>
                
                <!-- 💡 Các tab bị ẩn trên Mobile -->
                <a href="/suggestions" class="view-button active hide-on-mobile" data-tooltip="Gợi Ý AI"><i class="fa-solid fa-lightbulb"></i></a>
                <a href="/profile" class="view-button hide-on-mobile" data-tooltip="Tài khoản"><i class="fa-solid fa-user-tie"></i></a>
                <a href="/settings" class="view-button hide-on-mobile" data-tooltip="Cài Đặt"><i class="fa-solid fa-gear"></i></a>
                <a href="javascript:void(0)" class="view-button hide-on-mobile" onclick="showLogoutModal()" data-tooltip="Đăng Xuất" style="margin-left: auto; color: #ff4d4d;"><i class="fa-solid fa-right-from-bracket"></i></a>

                <!-- 💡 Menu 3 chấm (Hiển thị trên Mobile) -->
                <div class="more-menu-container">
                    <a href="javascript:void(0)" class="view-button" id="mobileMoreBtn" style="padding: 10px 15px;">
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </a>
                    <div class="more-dropdown" id="mobileMoreDropdown">
                        <a href="/suggestions" style="color: var(--accent);"><i class="fa-solid fa-lightbulb" style="color: var(--accent);"></i> Gợi Ý AI</a>
                        <a href="/profile"><i class="fa-solid fa-user-tie" style="color: #3b82f6"></i> Tài khoản</a>
                        <a href="/settings"><i class="fa-solid fa-gear" style="color: #8b5cf6"></i> Cài Đặt</a>
                        <a href="javascript:void(0)" onclick="showLogoutModal()" style="color: #ff4d4d"><i class="fa-solid fa-right-from-bracket"></i> Đăng Xuất</a>
                    </div>
                </div>
            </div>
        </header>

        <div class="form-container" style="background-color: var(--bg-secondary); margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <h2 style="text-align: center; color: var(--accent); margin-top: 0;">
                <i class="fa-solid fa-bullseye"></i> Lập Kế Hoạch Tiết Kiệm
            </h2>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 16px;">
                Thiết lập mục tiêu để Cú Mèo lập kế hoạch cắt giảm chi tiêu chi tiết cho bạn.
            </p>

            <div style="background-color: var(--bg-primary); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--border);">
                <h4 style="color: #4ade80; margin-top: 0; margin-bottom: 15px; border-bottom: none !important; padding-bottom: 0 !important;"><i class="fa-solid fa-flag-checkered"></i> Mục tiêu của bạn</h4>
                
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 200px;">
                        <input type="text" id="goalName" placeholder="VD: Mua xe máy mới..." style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background-color: var(--bg-secondary); color: var(--text-primary); outline: none; box-sizing: border-box; font-family: inherit;">
                    </div>
                    <div style="flex: 1; min-width: 150px;">
                        <input type="text" id="goalAmount" placeholder="Số tiền mục tiêu..." oninput="formatCurrencyInput(this)" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background-color: var(--bg-secondary); color: var(--text-primary); outline: none; box-sizing: border-box; font-family: inherit;">
                    </div>
                    <div style="flex: 1; min-width: 150px;">
                        <input type="number" id="goalMonths" placeholder="Đạt được trong mấy tháng?" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background-color: var(--bg-secondary); color: var(--text-primary); outline: none; box-sizing: border-box; font-family: inherit;">
                    </div>
                </div>
            </div>

            <div style="display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap;">
                <label for="monthWindow" style="color: var(--text-secondary); font-weight: bold;">Dựa trên dữ liệu:</label>
                <select id="monthWindow" style="padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border); background-color: var(--bg-primary); color: var(--text-primary); outline: none; cursor: pointer; font-family: inherit; font-weight: bold;">
                    <option value="1">1 tháng qua</option>
                    <option value="3" selected>3 tháng qua</option>
                    <option value="6">6 tháng qua</option>
                </select>
                <button id="btnGenerateSuggestions" class="nav-button" style="background-color: var(--accent); color: #fff; border: none; padding: 10px 25px; box-shadow: 0 2px 10px rgba(138,43,226,0.3);">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Lập kế hoạch
                </button>
            </div>
        </div>

        <div id="suggestionsLoading" class="form-container" style="display: none; text-align: center; color: var(--text-secondary); background-color: var(--bg-secondary); border: 1px solid var(--border);">
            <i class="fa-solid fa-spinner fa-spin" style="font-size: 28px; margin-bottom: 15px; color: var(--accent);"></i>
            <p style="margin: 0; font-weight: bold;">Cú Mèo đang phân tích và tính toán đường đi nước bước...</p>
        </div>

        <div id="suggestionsSummary" style="display: none;"></div>
        <div id="suggestionsList"></div>
    </div>

    <!-- MODAL XÁC NHẬN ĐĂNG XUẤT -->
    <div id="logoutConfirmModal" class="modal" style="display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); align-items: center; justify-content: center;">
        <div style="background-color: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; width: 90%; max-width: 400px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center;">
            <h3 style="color: var(--accent); margin-top: 0; margin-bottom: 15px;">
                <i class="fa-solid fa-right-from-bracket"></i> Xác nhận Đăng Xuất
            </h3>
            <p style="color: var(--text-secondary); line-height: 1.6; margin-bottom: 25px; font-size: 15px;">Bạn có chắc chắn muốn đăng xuất khỏi ExpenseOwl không?</p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button onclick="closeLogoutModal()" style="flex: 1; padding: 10px 20px; background-color: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;">Hủy bỏ</button>
                <button onclick="proceedLogout()" style="flex: 1; padding: 10px 20px; background-color: #ff4d4d; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;">Đăng Xuất</button>
            </div>
        </div>
    </div>

    <script src="/static/functions.js"></script>
    <script src="/static/suggestions.js"></script>
    <script src="/static/chatbot.js"></script>
    <script>
        // 💡 LOGIC NÚT 3 CHẤM CHO ĐIỆN THOẠI
        document.addEventListener('DOMContentLoaded', () => {
            const mobileMoreBtn = document.getElementById("mobileMoreBtn");
            const mobileMoreDropdown = document.getElementById("mobileMoreDropdown");
            if (mobileMoreBtn && mobileMoreDropdown) {
                mobileMoreBtn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    mobileMoreDropdown.classList.toggle("show");
                });
                document.addEventListener("click", (e) => {
                    if (!mobileMoreDropdown.contains(e.target) && e.target !== mobileMoreBtn) {
                        mobileMoreDropdown.classList.remove("show");
                    }
                });
            }
        });

        function formatCurrencyInput(input) {
            let value = input.value;
            value = value.replace(/[^\d.]/g, '');
            const parts = value.split('.');
            if (parts.length > 2) {
                value = parts[0] + '.' + parts.slice(1).join('');
            }
            if (value) {
                let splitValue = value.split('.');
                splitValue[0] = splitValue[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
                value = splitValue.join('.');
            }
            input.value = value;
        }

        function showLogoutModal() {
            document.getElementById('logoutConfirmModal').style.display = 'flex';
        }

        function closeLogoutModal() {
            document.getElementById('logoutConfirmModal').style.display = 'none';
        }

        function proceedLogout() {
            closeLogoutModal();
            if (typeof logout === 'function') {
                logout();
            } else {
                localStorage.removeItem('token');
                window.location.href = '/login';
            }
        }
    </script>
</body>
</html>
