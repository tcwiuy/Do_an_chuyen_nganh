<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'system';
            if (theme === 'light') { document.documentElement.setAttribute('data-theme', 'light'); } 
            else if (theme === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); }
        })();
    </script>
    <title>ExpenseOwl Table</title>
</head>
<body>
    <div class="container">
        <header>
            <div class="nav-bar">
                <a href="/" class="view-button" data-tooltip="Dashboard"><i class="fa-solid fa-chart-pie"></i></a>
                <a href="/table" class="view-button active" data-tooltip="Table View"><i class="fa-solid fa-table"></i></a>
                <a href="/settings" class="view-button" data-tooltip="Settings"><i class="fa-solid fa-gear"></i></a>
                <a href="javascript:void(0)" class="view-button" onclick="logout()" data-tooltip="Logout" style="margin-left: auto; color: #ff4d4d;"><i class="fa-solid fa-right-from-bracket"></i></a>
            </div>
        </header>

        <div class="month-navigation">
            <button id="prevMonth" class="nav-button"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="current-month" id="currentMonth"></div>
            <button id="nextMonth" class="nav-button"><i class="fa-solid fa-arrow-right"></i></button>
        </div>
        
        <div class="form-container" style="display: flex; gap: 20px; align-items: center; justify-content: center; flex-wrap: wrap; padding: 1rem; margin-bottom: 1rem;">
            <label for="showAllToggle" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: var(--text-secondary);">
                <input type="checkbox" id="showAllToggle" class="styled-checkbox"> Show All Transactions
            </label>
            <div style="display: flex; align-items: center; gap: 10px;">
                <i class="fa-solid fa-filter" style="color: var(--text-secondary);"></i>
                <select id="categoryFilter" style="padding: 0.5rem; border-radius: 4px; background-color: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border); outline: none; cursor: pointer; font-size: 1rem;">
                    <option value="all">Tất cả danh mục</option>
                </select>
            </div>
            <button onclick="OCRScanner.open(function(){ initialize(); })" class="nav-button"><i class="fa-solid fa-plus"></i> Scan Receipt</button>
            <script src="/static/ocr_scanner.js"></script>
        </div>

        <div class="form-container">
            <form id="expenseForm" class="expense-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" value="-" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required><option value="">categories</option></select>
                </div>
                <div class="form-group">
                    <label for="tags-input">Tags</label>
                    <div id="tags-input-container" class="tags-input-container">
                        <div id="selected-tags" class="selected-tags"></div>
                        <input type="text" id="tags-input" placeholder="(optional)">
                    </div>
                    <div id="tags-dropdown" class="tags-dropdown"></div>
                </div>
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" step="0.01" min="0.01" max="9000000000000000" required>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" required>
                    <script>
                        const td = new Date();
                        document.getElementById('date').value = `${td.getFullYear()}-${String(td.getMonth() + 1).padStart(2, '0')}-${String(td.getDate()).padStart(2, '0')}`;
                    </script>
                </div>
                <div class="form-group form-group-checkbox">
                    <label for="reportGain">Report Gain</label>
                    <input type="checkbox" id="reportGain" class="styled-checkbox">
                </div>
                <button type="submit" class="nav-button">Add Expense</button>
            </form>
            <div id="formMessage" class="form-message"></div>
        </div>

        <div id="tableContainer" style="overflow-x: auto;"></div>
    </div>

    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h3>Delete Expense</h3>
            <p>Are you sure you want to delete this expense? (cannot be undone)</p>
            <div class="modal-buttons">
                <button class="modal-button" onclick="closeDeleteModal()">Cancel</button>
                <button class="modal-button confirm" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>
    <div id="customConfirmModal" style="display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); align-items: center; justify-content: center;">
        <div style="background: linear-gradient(145deg, #2a1e2d, #402a30); border: 2px solid #ff4d4d; border-radius: 12px; width: 90%; max-width: 450px; padding: 25px; box-shadow: 0 0 25px rgba(255, 77, 77, 0.4); text-align: center;">
            <h3 style="color: #ff4d4d; margin-top: 0; margin-bottom: 15px;">
                <i class="fa-solid fa-triangle-exclamation fa-beat"></i> Cảnh Báo
            </h3>
            <p id="confirmMessage" style="color: #e0e0e0; line-height: 1.6; margin-bottom: 25px; white-space: pre-line; font-size: 15px;"></p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button id="btnConfirmCancel" style="padding: 10px 20px; background-color: #4a4a60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Hủy bỏ</button>
                <button id="btnConfirmProceed" style="padding: 10px 20px; background-color: #ff4d4d; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Vẫn Lưu</button>
            </div>
        </div>
    </div>

    <script src="/static/functions.js"></script>
    <script>
        let currentCurrency = 'usd', currentDate = new Date(), allExpenses = [], expensesForTable = [], startDate = 1, allTags = new Set(), selectedTags = new Set(), categoryColors = {};
        
        // Đổi mặc định thành "Không sắp xếp cột nào cả" (null)
        let currentFilterCategory = 'all', currentSortColumn = null, currentSortOrder = null;

        function assignCategoryColors(categories) {
            categories.forEach((category, index) => {
                if (!categoryColors[category]) categoryColors[category] = colorPalette[index % colorPalette.length]; 
            });
        }

        window.getSortIcon = function(column) {
            if (currentSortColumn !== column) return '<i class="fa-solid fa-sort" style="color: #4a4a60; margin-left: 5px;"></i>';
            return currentSortOrder === 'asc' ? '<i class="fa-solid fa-sort-up" style="color: #d4a5ff; margin-left: 5px;"></i>' : '<i class="fa-solid fa-sort-down" style="color: #d4a5ff; margin-left: 5px;"></i>';
        };

        window.handleSort = function(column) {
            if (currentSortColumn === column) {
                if (currentSortOrder === 'desc') {
                    currentSortOrder = 'asc'; // Bấm lần 2: Tăng dần
                } else {
                    currentSortColumn = null; // Bấm lần 3: Hủy sắp xếp, đưa về null
                    currentSortOrder = null;
                    // Đã bỏ thông báo showToast ở đây theo ý bạn
                }
            } else {
                currentSortColumn = column; // Bấm lần 1: Giảm dần
                currentSortOrder = 'desc'; 
            }
            updateTable();
        };

        function createTable(expenses) {
            if (!expenses || expenses.length === 0) {
                return `<div class="no-data">${document.getElementById('showAllToggle').checked ? 'No transactions found' : 'No expenses recorded for this period'}</div>`;
            }
            const hasTags = expenses.some(exp => exp.tags && exp.tags.length > 0);
            
            return `
                <table class="expense-table" style="width: 100%;">
                    <thead>
                        <tr>
                            <th style="cursor: pointer; transition: 0.2s;" onclick="handleSort('name')" onmouseover="this.style.color='#d4a5ff'" onmouseout="this.style.color=''">Name ${getSortIcon('name')}</th>
                            <th>Category</th>
                            ${hasTags ? '<th class="tags-column">Tags</th>' : ''}
                            <th style="cursor: pointer; transition: 0.2s;" onclick="handleSort('amount')" onmouseover="this.style.color='#d4a5ff'" onmouseout="this.style.color=''">Amount ${getSortIcon('amount')}</th>
                            <th style="cursor: pointer; transition: 0.2s;" class="date-header" onclick="handleSort('date')" onmouseover="this.style.color='#d4a5ff'" onmouseout="this.style.color=''">Date ${getSortIcon('date')}</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${expenses.map((expense, index) => {
                            const catColor = categoryColors[expense.category] || '#d4a5ff';
                            return `
                            <tr>
                                <td>${escapeHTML(expense.name)}</td>
                                <td><span style="background: ${catColor}1A; color: ${catColor}; border: 1px solid ${catColor}40; padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; white-space: nowrap;">${escapeHTML(expense.category)}</span></td>
                                ${hasTags ? `<td class="tags-column">${(expense.tags || []).map(escapeHTML).join(', ')}</td>` : ''}
                                <td class="amount ${expense.amount > 0 ? 'positive' : 'negative'}" style="font-weight: bold;">${formatCurrency(expense.amount)}</td>
                                <td class="date-column">${formatDateFromUTC(expense.date)}</td>
                                <td>
                                    <button class="edit-button" onclick="editExpenseByIndex(${index})"><i class="fa-solid fa-pen-to-square"></i></button>
                                    <button class="delete-button" onclick="handleDeleteClick(event, '${expense.id}')"><i class="fa-solid fa-trash-can"></i></button>
                                </td>
                            </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        function updateTable() {
            const showAll = document.getElementById('showAllToggle').checked;
            document.querySelector('.month-navigation').style.display = showAll ? 'none' : 'flex';
            let filteredList = showAll ? allExpenses.slice() : getMonthExpenses(allExpenses);

            if (currentFilterCategory !== 'all') {
                filteredList = filteredList.filter(exp => exp.category === currentFilterCategory);
            }

            filteredList.sort((a, b) => {
                // Nếu currentSortColumn là null (Không sắp xếp cột nào) -> Ngầm xếp theo ngày mới nhất
                if (!currentSortColumn) {
                    return new Date(b.date).getTime() - new Date(a.date).getTime();
                }

                let valA, valB;
                if (currentSortColumn === 'date') { valA = new Date(a.date).getTime(); valB = new Date(b.date).getTime(); } 
                else if (currentSortColumn === 'amount') { valA = a.amount; valB = b.amount; } 
                else if (currentSortColumn === 'name') { valA = a.name.toLowerCase(); valB = b.name.toLowerCase(); }

                if (valA < valB) return currentSortOrder === 'asc' ? -1 : 1;
                if (valA > valB) return currentSortOrder === 'asc' ? 1 : -1;
                return 0;
            });

            expensesForTable = filteredList; 
            document.getElementById('tableContainer').innerHTML = createTable(expensesForTable);
        }

        document.getElementById('categoryFilter').addEventListener('change', (e) => {
            currentFilterCategory = e.target.value;
            updateTable();
        });

        function editExpenseByIndex(index) {
            const expense = expensesForTable[index]; 
            if (expense) editExpense(expense.id, expense.name, expense.category, expense.amount, (expense.tags || []), expense.date);
        }

        function renderSelectedTags(tags) {
            const selectedContainer = document.getElementById('selected-tags');
            selectedContainer.innerHTML = '';
            selectedTags.clear();
            (tags || []).forEach(tag => {
                selectedTags.add(tag);
                const pill = document.createElement('div');
                pill.className = 'tag-pill';
                pill.textContent = tag;
                const removeBtn = document.createElement('span');
                removeBtn.className = 'remove-tag';
                removeBtn.textContent = '×';
                removeBtn.onclick = () => { selectedTags.delete(tag); pill.remove(); };
                pill.appendChild(removeBtn);
                selectedContainer.appendChild(pill);
            });
        }

        function editExpense(id, name, category, amount, tags, date) {
            document.getElementById('name').value = name;
            document.getElementById('category').value = category;
            
            let displayAmount = Math.abs(amount);
            if (typeof exchangeRatesToVND !== 'undefined') {
                const rate = exchangeRatesToVND[currentCurrency] || 1;
                displayAmount = displayAmount / rate;
            }
            document.getElementById('amount').value = displayAmount;
            document.getElementById('reportGain').checked = amount > 0;
            renderSelectedTags(tags);
            
            const localDate = new Date(date);
            document.getElementById('date').value = `${localDate.getFullYear()}-${String(localDate.getMonth() + 1).padStart(2, '0')}-${String(localDate.getDate()).padStart(2, '0')}`;
            
            const form = document.getElementById('expenseForm');
            form.dataset.editId = id;
            form.querySelector('button[type="submit"]').innerHTML = '<i class="fa-solid fa-pen-to-square"></i> Update Expense';
            form.scrollIntoView({ behavior: 'smooth' });
        }

        function setupTagInput() {
            const container = document.getElementById('tags-input-container');
            const input = document.getElementById('tags-input');
            const dropdown = document.getElementById('tags-dropdown');
            const formGroup = container.parentElement;

            const addTag = (tag) => {
                tag = tag.trim();
                if (tag && !selectedTags.has(tag)) { selectedTags.add(tag); renderSelectedTags(Array.from(selectedTags)); }
                input.value = ''; dropdown.style.display = 'none';
            };

            input.addEventListener('focus', () => {
                dropdown.innerHTML = '';
                const availableTags = [...allTags].filter(tag => !selectedTags.has(tag));
                if (availableTags.length > 0) {
                    availableTags.forEach(tag => {
                        const item = document.createElement('div');
                        item.textContent = tag; item.onclick = () => addTag(tag); dropdown.appendChild(item);
                    });
                    dropdown.style.display = 'block';
                }
            });

            input.addEventListener('input', () => {
                const value = input.value.trim().toLowerCase();
                dropdown.innerHTML = '';
                const filteredTags = [...allTags].filter(tag => tag.toLowerCase().includes(value) && !selectedTags.has(tag));
                
                if(value && ![...allTags].map(t => t.toLowerCase()).includes(value)) {
                    const newItem = document.createElement('div');
                    newItem.textContent = `+ Create "${input.value.trim()}"`; newItem.className = 'new-tag'; newItem.onclick = () => addTag(input.value.trim()); dropdown.appendChild(newItem);
                }

                filteredTags.forEach(tag => {
                    const item = document.createElement('div'); item.textContent = tag; item.onclick = () => addTag(tag); dropdown.appendChild(item);
                });
                
                dropdown.style.display = dropdown.children.length > 0 ? 'block' : 'none';
            });

            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); if (input.value.trim()) addTag(input.value.trim()); }});
            container.addEventListener('click', () => input.focus());
            document.addEventListener('click', (e) => { if (!formGroup.contains(e.target)) dropdown.style.display = 'none'; });
        }

        async function initialize() {
            try {
                const configResponse = await fetch('/api/config');
                if (!configResponse.ok) throw new Error('Failed to fetch configuration');
                const config = await configResponse.json();
                
                document.getElementById('category').innerHTML = config.categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
                document.getElementById('categoryFilter').innerHTML = `<option value="all">Tất cả danh mục</option>` + config.categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');

                currentCurrency = config.currency;
                startDate = config.startDate;
                
                const response = await fetch('/api/expenses/');
                if (!response.ok) throw new Error('Failed to fetch data');
                const data = await response.json();
                allExpenses = Array.isArray(data) ? data : (data && Array.isArray(data.expenses) ? data.expenses : []);
                
                allTags.clear();
                allExpenses.forEach(exp => { if (exp.tags) exp.tags.forEach(tag => allTags.add(tag)); });

                const uniqueCategories = [...new Set(allExpenses.map(exp => exp.category))];
                assignCategoryColors(uniqueCategories);

                updateMonthDisplay();
                updateTable();
                setupTagInput();
            } catch (error) {
                console.error('Failed to initialize table:', error);
                document.getElementById('tableContainer').innerHTML = '<div class="no-data">Failed to load expenses</div>';
            }
        }

        document.getElementById('showAllToggle').addEventListener('change', updateTable);
        document.getElementById('prevMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); updateMonthDisplay(); updateTable(); });
        document.getElementById('nextMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); updateMonthDisplay(); updateTable(); });

        let expenseToDelete = null;
        function showDeleteModal(id) { expenseToDelete = id; document.getElementById('deleteModal').classList.add('active'); }
        function handleDeleteClick(event, id) { if (event.shiftKey) { expenseToDelete = id; confirmDelete(); } else { showDeleteModal(id); } }
        function closeDeleteModal() { expenseToDelete = null; document.getElementById('deleteModal').classList.remove('active'); }

        async function confirmDelete() {
            if (!expenseToDelete) return;
            try {
                const response = await fetch(`/api/expenses/${expenseToDelete}`, { method: 'DELETE' });
                if (!response.ok) throw new Error('Failed to delete expense');
                if(window.showToast) showToast('Đã xóa giao dịch thành công!', "success");
                await initialize();
                closeDeleteModal();
            } catch (error) {
                if(window.showToast) showToast('Lỗi: Không thể xóa giao dịch.', "error");
            }
        }

        document.getElementById('deleteModal').addEventListener('click', (e) => { if (e.target.className === 'modal active') closeDeleteModal(); });

        // Hàm hiển thị Popup
        function showCustomConfirm(message) {
            return new Promise((resolve) => {
                const modal = document.getElementById('customConfirmModal');
                const msgEl = document.getElementById('confirmMessage');
                const btnCancel = document.getElementById('btnConfirmCancel');
                const btnProceed = document.getElementById('btnConfirmProceed');

                msgEl.textContent = message;
                modal.style.display = 'flex';

                const cleanup = () => {
                    modal.style.display = 'none';
                    btnCancel.removeEventListener('click', onCancel);
                    btnProceed.removeEventListener('click', onProceed);
                };

                const onCancel = () => { cleanup(); resolve(false); }; 
                const onProceed = () => { cleanup(); resolve(true); };  

                btnCancel.addEventListener('click', onCancel);
                btnProceed.addEventListener('click', onProceed);
            });
        }

        // Bắt sự kiện lưu Form (Thêm mới & Cập nhật)
        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const editId = form.dataset.editId; // Dùng để nhận biết xem là Thêm mới hay Chỉnh sửa
            const isGain = document.getElementById('reportGain').checked;
            
            let rawAmount = parseFloat(document.getElementById('amount').value);
            const selectedCategory = document.getElementById('category').value;

            // 1. Tính tỷ giá ra VND
            let rate = 1;
            if (typeof exchangeRatesToVND !== 'undefined') {
                rate = exchangeRatesToVND[currentCurrency] || 1;
            }
            let amountInVND = rawAmount * rate;

            // ==========================================
            // 🚦 KIỂM TRA BẤT THƯỜNG (Có fix Kịch Bản 3)
            // ==========================================
            if (!isGain && selectedCategory) {
                const categoryExpenses = allExpenses.filter(exp => exp.amount < 0 && exp.category === selectedCategory);
                let categoryAverageVND = 0;
                
                if (categoryExpenses.length > 0) {
                    const totalCategory = categoryExpenses.reduce((sum, exp) => sum + Math.abs(exp.amount), 0);
                    categoryAverageVND = totalCategory / categoryExpenses.length;
                }

                // Cố định mốc tối thiểu là 50 USD quy ra VND (~1.27 triệu)
                const minAlertAmountVND = 50 * exchangeRatesToVND['usd']; 

                if (categoryAverageVND > 0 && amountInVND > (categoryAverageVND * 3) && amountInVND > minAlertAmountVND) {
                    const confirmMsg = `Số tiền bạn định lưu (${formatCurrency(amountInVND)}) lớn hơn GẤP NHIỀU LẦN so với mức chi tiêu trung bình của danh mục "${selectedCategory}" (${formatCurrency(categoryAverageVND)}).\n\nBạn có chắc chắn thông tin này là chính xác và muốn lưu không?`;
                    
                    const userConfirmed = await showCustomConfirm(confirmMsg);
                    if (!userConfirmed) {
                        return; // Ngừng chạy nếu Hủy bỏ
                    }
                }
            }
            // ==========================================

            let finalAmountToSave = amountInVND;
            if (!isGain) {
                finalAmountToSave *= -1;
            }

            const formData = {
                name: document.getElementById('name').value, 
                category: selectedCategory,
                amount: finalAmountToSave, 
                date: getISODateWithLocalTime(document.getElementById('date').value), 
                tags: Array.from(selectedTags)
            };

            try {
                const submitBtn = form.querySelector('button[type="submit"]');
                submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang xử lý...';
                submitBtn.disabled = true;

                const response = await fetch(editId ? `/api/expenses/${editId}` : '/api/expenses/', {
                    method: editId ? 'PUT' : 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(formData)
                });
                
                if (response.ok) {
                    if(window.showToast) showToast(editId ? 'Đã cập nhật giao dịch!' : 'Đã thêm giao dịch mới!', "success");
                    form.reset(); 
                    document.getElementById('selected-tags').innerHTML = ''; 
                    selectedTags.clear(); 
                    delete form.dataset.editId;
                    await initialize();
                    const td = new Date();
                    document.getElementById('date').value = `${td.getFullYear()}-${String(td.getMonth() + 1).padStart(2, '0')}-${String(td.getDate()).padStart(2, '0')}`;
                } else {
                    const error = await response.json();
                    if(window.showToast) showToast(`Lỗi: ${error.error || 'Failed to save'}`, "error");
                }
            } catch (error) {
                if(window.showToast) showToast("Lỗi kết nối máy chủ!", "error");
            } finally {
                const submitBtn = form.querySelector('button[type="submit"]');
                submitBtn.innerHTML = 'Add Expense'; 
                submitBtn.disabled = false;
            }
        });
        
        document.addEventListener('DOMContentLoaded', initialize);
        document.getElementById('name').addEventListener('click', (e) => { if (e.target.value === '-') e.target.value = ''; });
        window.editExpenseByIndex = editExpenseByIndex;
    </script>
    <script src="/static/chatbot.js"></script>
</body>
</html>
